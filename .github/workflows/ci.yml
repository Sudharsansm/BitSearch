name: BIE CI / CD

on:
  push:
    branches:
      - main
      - develop
    tags:
      - "v*"
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version:
          - "3.11"
          - "3.12"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run Tests
        run: |
          pytest tests/ -v --tb=short

  build:
    needs: test
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      #  FIXED: Upgraded from @v4 to @v6 to eliminate Node.js 20 warning
      - uses: actions/checkout@v6

      #  FIXED: Upgraded from @v5 to @v6 to eliminate Node.js 20 warning
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build Package
        run: |
          python -m pip install --upgrade pip
          pip install build twine
          python -m build
          twine check dist/*

      - name: Upload Distribution
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      id-token: write
      contents: read
    environment:
      name: pypi
    steps:
      - name: Download Distribution
        uses: actions/download-artifact@v7
        with:
          name: dist
          #  FIXED: When using download-artifact@v7, omit or change path 
          # if you want the files placed directly inside the workspace.
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
